{{- if .Values.samples.enable }}
apiVersion: runners.runner-operator.io/v1alpha1
kind: Workflow
metadata:
  name: {{ include "runner-operator.fullname" . }}-sample-workflow
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "runner-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  timeout: "1h"
  steps:
    - name: build
      image: busybox:latest
      command: ["sh", "-c"]
      args: ["echo building && sleep 2"]
      timeout: "5m"
    - name: test
      image: busybox:latest
      command: ["sh", "-c"]
      args: ["echo testing && sleep 2"]
      dependsOn: ["build"]
      when: "on_success"
      retry:
        maxRetries: 1
        backoff:
          initialDelay: 5s
    - name: deploy
      image: busybox:latest
      command: ["sh", "-c"]
      args: ["echo deploying && sleep 2"]
      dependsOn: ["test"]
      when: "on_success"
{{- end }}
