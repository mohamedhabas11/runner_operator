{{- if .Values.samples.enable }}
apiVersion: runners.runner-operator.io/v1alpha1
kind: Runner
metadata:
  name: {{ include "runner-operator.fullname" . }}-sample-runner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "runner-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  image: busybox:latest
  args: ["sh", "-c", "echo hello && sleep 5"]
  env:
    - name: MY_VAR
      value: "hello"
  timeoutAfter: "1h"
{{- end }}
