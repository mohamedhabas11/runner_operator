name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Fetch tags for release notes
        run: git fetch --tags

      - uses: azure/setup-helm@v5

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" dist/chart/Chart.yaml
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Package chart
        run: helm package dist/chart --destination .release-packages

      - name: Generate release notes
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          cat > /tmp/release-notes.md << NOTEEND
          ## runner-operator ${GITHUB_REF_NAME}

          ### CRD Upgrade Notice

          Helm does not automatically update CRDs during \`helm upgrade\`.
          If this release includes CRD schema changes, apply them first:

          \`\`\`
          kubectl apply --server-side -f https://raw.githubusercontent.com/${OWNER}/${REPO}/${GITHUB_REF_NAME}/config/crd/bases/
          \`\`\`

          Then proceed with the Helm upgrade:

          \`\`\`
          helm repo update ${REPO}
          helm upgrade runner-operator ${REPO}/runner-operator
          \`\`\`

          ### Changes

          NOTEEND
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --oneline --no-merges >> /tmp/release-notes.md
          else
            git log --oneline --no-merges -30 >> /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            .release-packages/runner-operator-*.tgz \
            --title "runner-operator ${GITHUB_REF_NAME}" \
            -F /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish chart to GitHub Pages
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          CHART_URL="https://${OWNER}.github.io/${REPO}"

          if ! git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch does not exist; creating orphan branch"
            git checkout --orphan gh-pages
            git reset --hard
            rm -rf .release-packages
            git commit --allow-empty -m "Initial gh-pages branch"
            git push origin gh-pages
            git checkout "${GITHUB_REF_NAME}"
          fi

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages

          cp .release-packages/runner-operator-*.tgz /tmp/gh-pages/

          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index /tmp/gh-pages/ \
              --url "${CHART_URL}" \
              --merge /tmp/gh-pages/index.yaml
          else
            helm repo index /tmp/gh-pages/ \
              --url "${CHART_URL}"
          fi

          cd /tmp/gh-pages
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release ${GITHUB_REF_NAME}"
            git push origin gh-pages
          fi

          git worktree remove /tmp/gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
