# This rule is not used by the project runner-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to runners.runner-operator.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: runner-operator
    app.kubernetes.io/managed-by: kustomize
  name: workflow-viewer-role
rules:
- apiGroups:
  - runners.runner-operator.io
  resources:
  - workflows
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - runners.runner-operator.io
  resources:
  - workflows/status
  verbs:
  - get
