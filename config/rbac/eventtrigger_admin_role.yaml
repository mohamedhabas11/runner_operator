# This rule is not used by the project runner-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over runners.runner-operator.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: runner-operator
    app.kubernetes.io/managed-by: kustomize
  name: eventtrigger-admin-role
rules:
- apiGroups:
  - runners.runner-operator.io
  resources:
  - eventtriggers
  verbs:
  - '*'
- apiGroups:
  - runners.runner-operator.io
  resources:
  - eventtriggers/status
  verbs:
  - get
