---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: eventtriggers.runners.runner-operator.io
spec:
  group: runners.runner-operator.io
  names:
    kind: EventTrigger
    listKind: EventTriggerList
    plural: eventtriggers
    singular: eventtrigger
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.webhook.path
      name: Path
      type: string
    - jsonPath: .spec.workflowTemplate.name
      name: Template
      type: string
    - jsonPath: .status.registered
      name: Registered
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EventTrigger is the Schema for the eventtriggers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EventTriggerSpec defines the desired state of EventTrigger.
            properties:
              allowedNamespaces:
                description: |-
                  AllowedNamespaces restricts which namespaces workflows may be created in.
                  Defaults to the trigger's namespace when empty.
                items:
                  type: string
                type: array
              parameters:
                description: |-
                  Parameters maps webhook payload fields to environment variables on the
                  created workflow's first step.  Extracted values are injected as Env vars.
                items:
                  description: ParameterMapping maps a webhook JSON payload field
                    to a workflow environment variable.
                  properties:
                    default:
                      description: |-
                        Default value if the source field is missing from the payload.
                        Ignored when Required is true.
                      type: string
                    name:
                      description: Name of the environment variable to set on the
                        created workflow.
                      type: string
                    required:
                      description: |-
                        Required marks this parameter as mandatory. When true and the source
                        field is missing from the webhook payload, the EventTrigger sets a
                        Ready=False condition and does not create a Workflow.
                        When false (default), missing fields produce an empty env var and a
                        warning-level log entry, and the Workflow is created.
                      type: boolean
                    sanitize:
                      description: Sanitize strips shell metacharacters from the extracted
                        value.
                      type: boolean
                    source:
                      description: Source is a dot-path into the webhook JSON payload
                        (e.g. "$.ref").
                      type: string
                  required:
                  - name
                  - source
                  type: object
                type: array
              rateLimit:
                description: RateLimit controls how often this trigger may create
                  workflows.
                properties:
                  maxConcurrent:
                    description: |-
                      MaxConcurrent limits the number of concurrently running workflows.
                      Zero means unlimited.
                    minimum: 0
                    type: integer
                  maxPerMinute:
                    description: |-
                      MaxPerMinute limits the number of workflow creations per minute.
                      Zero means unlimited.
                    minimum: 0
                    type: integer
                type: object
              webhook:
                description: Webhook configures the HTTP webhook endpoint for this
                  trigger.
                properties:
                  allowedIPs:
                    description: AllowedIPs restricts webhook traffic to specific
                      CIDR ranges.
                    items:
                      type: string
                    type: array
                  path:
                    description: |-
                      Path is the HTTP path for this webhook (e.g. "/webhooks/github-push").
                      Must be unique across all EventTriggers in the cluster.
                    type: string
                  secretRef:
                    description: |-
                      SecretRef references a Secret containing the HMAC secret for payload validation.
                      The secret must have key "hmac-secret". Defaults to the EventTrigger's namespace.
                    properties:
                      name:
                        description: name is unique within a namespace to reference
                          a secret resource.
                        type: string
                      namespace:
                        description: namespace defines the space within which the
                          secret name must be unique.
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                required:
                - path
                type: object
              workflowTemplate:
                description: WorkflowTemplate references the Workflow CR to create
                  when triggered.
                properties:
                  name:
                    description: Name of the Workflow template CR to instantiate.
                    type: string
                  namespace:
                    description: Namespace of the Workflow template. Defaults to the
                      trigger's namespace.
                    type: string
                required:
                - name
                type: object
            required:
            - workflowTemplate
            type: object
          status:
