# This NetworkPolicy isolates tenant namespaces from each other.
# Apply to each tenant namespace to prevent cross-tenant Pod traffic
# while still allowing traffic from the operator's management namespace.
# WHY: In multi-tenant deployments, teams should not be able to reach
# each other's Pods directly. All job-to-job communication should go
# through the operator or external services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: isolate-tenant
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from the operator management namespace
    - from:
      - namespaceSelector:
          matchLabels:
            app.kubernetes.io/name: runner-operator
      ports:
        - port: 9090
          protocol: TCP
    # Allow DNS resolution
    - from:
      - namespaceSelector: {}
        podSelector:
          matchLabels:
            k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
